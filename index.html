<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>动漫人物档案库</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-card: #1a1a2e;
    --bg-card-hover: #222240;
    --accent: #6c63ff;
    --accent-light: #8b83ff;
    --accent-glow: rgba(108, 99, 255, 0.3);
    --text-primary: #e8e6f0;
    --text-secondary: #9895a8;
    --text-muted: #6b6879;
    --border: rgba(108, 99, 255, 0.15);
    --gradient-1: linear-gradient(135deg, #6c63ff 0%, #e040fb 100%);
    --gradient-2: linear-gradient(135deg, #00d2ff 0%, #6c63ff 100%);
    --gradient-3: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    --radius: 16px;
    --radius-sm: 10px;
  }

  body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }

  .bg-effects { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .bg-effects .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; animation: float 20s ease-in-out infinite; }
  .bg-effects .orb:nth-child(1) { width: 400px; height: 400px; background: #6c63ff; top: -100px; left: -100px; }
  .bg-effects .orb:nth-child(2) { width: 300px; height: 300px; background: #e040fb; bottom: -50px; right: -50px; animation-delay: -7s; }
  .bg-effects .orb:nth-child(3) { width: 250px; height: 250px; background: #00d2ff; top: 50%; left: 50%; animation-delay: -14s; }
  @keyframes float { 0%,100%{transform:translate(0,0) scale(1);} 33%{transform:translate(30px,-30px) scale(1.1);} 66%{transform:translate(-20px,20px) scale(0.9);} }

  .site-header { position:relative; z-index:10; padding:28px 40px; display:flex; align-items:center; gap:16px; border-bottom:1px solid var(--border); background:rgba(10,10,15,0.8); backdrop-filter:blur(20px); }
  .site-header .logo { font-family:'Zen Maru Gothic',sans-serif; font-size:26px; font-weight:900; background:var(--gradient-1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:2px; }
  .site-header .subtitle { font-size:13px; color:var(--text-muted); margin-left:8px; }

  .main-layout { position:relative; z-index:10; display:flex; min-height:calc(100vh - 80px); }

  .sidebar { width:280px; min-width:280px; border-right:1px solid var(--border); background:rgba(18,18,26,0.6); backdrop-filter:blur(10px); padding:20px 0; overflow-y:auto; max-height:calc(100vh - 80px); position:sticky; top:0; }
  .sidebar::-webkit-scrollbar { width:4px; }
  .sidebar::-webkit-scrollbar-track { background:transparent; }
  .sidebar::-webkit-scrollbar-thumb { background:var(--accent); border-radius:4px; }
  .sidebar-title { font-size:12px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:3px; padding:0 24px 12px; }
  .home-btn { display:flex; align-items:center; gap:10px; padding:12px 24px; cursor:pointer; transition:all 0.3s ease; border-left:3px solid transparent; color:var(--text-secondary); font-size:14px; }
  .home-btn:hover { background:rgba(108,99,255,0.06); border-left-color:var(--accent); color:var(--text-primary); }
  .home-btn .home-icon { font-size:18px; width:24px; text-align:center; }
  .sidebar-divider { height:1px; background:var(--border); margin:8px 24px; }
  .search-box { padding:0 20px 12px; }
  .search-input { width:100%; padding:8px 12px 8px 34px; background:rgba(108,99,255,0.08); border:1px solid var(--border); border-radius:8px; color:var(--text-primary); font-size:13px; outline:none; transition:all 0.3s ease; }
  .search-input::placeholder { color:var(--text-muted); }
  .search-input:focus { border-color:var(--accent); background:rgba(108,99,255,0.12); }
  .search-wrap { position:relative; }
  .search-wrap .search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:14px; color:var(--text-muted); pointer-events:none; }
  .anime-hidden { display:none !important; }

  .anime-item { display:flex; align-items:center; gap:14px; padding:14px 24px; cursor:pointer; transition:all 0.3s ease; border-left:3px solid transparent; }
  .anime-item:hover { background:rgba(108,99,255,0.06); border-left-color:var(--accent); }
  .anime-item.active { background:rgba(108,99,255,0.1); border-left-color:var(--accent-light); }
  .anime-item .anime-icon { width:48px; height:48px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; overflow:hidden; }
  .anime-item .anime-icon img { width:100%; height:100%; object-fit:cover; border-radius:var(--radius-sm); }
  .anime-item .anime-info { flex:1; min-width:0; }
  .anime-item .anime-name { font-size:15px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .anime-item .anime-meta { font-size:12px; color:var(--text-muted); margin-top:2px; }

  .content-area { flex:1; padding:0; overflow-y:auto; max-height:calc(100vh - 80px); }
  .content-area::-webkit-scrollbar { width:6px; }
  .content-area::-webkit-scrollbar-track { background:transparent; }
  .content-area::-webkit-scrollbar-thumb { background:rgba(108,99,255,0.3); border-radius:6px; }

  .welcome-page { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; padding:40px; }
  .welcome-page .welcome-icon { font-size:72px; margin-bottom:24px; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
  .welcome-page h2 { font-family:'Zen Maru Gothic',sans-serif; font-size:28px; margin-bottom:12px; background:var(--gradient-1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .welcome-page p { color:var(--text-secondary); font-size:15px; max-width:400px; line-height:1.8; }

  .anime-detail { display:none; }
  .anime-detail.active { display:block; }

  .anime-banner { position:relative; height:320px; overflow:hidden; }
  .anime-banner .banner-bg { width:100%; height:100%; object-fit:cover; filter:brightness(0.4) blur(2px); }
  .anime-banner .banner-overlay { position:absolute; inset:0; background:linear-gradient(180deg,transparent 30%,var(--bg-primary) 100%); display:flex; align-items:flex-end; padding:40px; }
  .banner-content { display:flex; align-items:flex-end; gap:32px; width:100%; }
  .banner-poster { width:160px; height:220px; border-radius:var(--radius); overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.5); flex-shrink:0; border:2px solid rgba(255,255,255,0.1); }
  .banner-poster img { width:100%; height:100%; object-fit:cover; }
  .banner-info { flex:1; padding-bottom:8px; }
  .banner-info h1 { font-family:'Zen Maru Gothic',sans-serif; font-size:36px; font-weight:900; margin-bottom:6px; text-shadow:0 2px 20px rgba(0,0,0,0.5); }
  .banner-info .jp-name { font-size:16px; color:var(--text-secondary); margin-bottom:14px; font-weight:300; }
  .banner-tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
  .banner-tags .tag { padding:4px 14px; border-radius:20px; font-size:12px; font-weight:500; background:rgba(108,99,255,0.2); color:var(--accent-light); border:1px solid rgba(108,99,255,0.3); }
  .banner-stats { display:flex; gap:24px; font-size:13px; color:var(--text-secondary); }
  .banner-stats span { display:flex; align-items:center; gap:6px; }
  .banner-stats .stat-icon { font-size:16px; }

  .anime-synopsis { padding:32px 40px; border-bottom:1px solid var(--border); }
  .anime-synopsis h3 { font-size:18px; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .anime-synopsis h3::before { content:''; width:4px; height:20px; background:var(--gradient-1); border-radius:2px; }
  .anime-synopsis p { font-size:14px; line-height:2; color:var(--text-secondary); }

  .seasons-section { padding:0 40px 32px; border-bottom:1px solid var(--border); }
  .seasons-section h3 { font-size:18px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .seasons-section h3::before { content:''; width:4px; height:20px; background:var(--gradient-3); border-radius:2px; }
  .season-list { display:flex; flex-direction:column; gap:10px; }
  .season-card { background:var(--bg-card); border-radius:var(--radius-sm); padding:14px 20px; border:1px solid var(--border); display:flex; align-items:center; gap:16px; transition:all 0.3s; }
  .season-card:hover { border-color:var(--accent); background:var(--bg-card-hover); }
  .season-badge { padding:6px 14px; border-radius:20px; font-size:12px; font-weight:700; background:var(--gradient-1); color:#fff; white-space:nowrap; flex-shrink:0; }
  .season-info { flex:1; }
  .season-title { font-size:14px; font-weight:700; margin-bottom:3px; }
  .season-meta { font-size:12px; color:var(--text-muted); display:flex; gap:16px; flex-wrap:wrap; }
  .season-meta span { display:flex; align-items:center; gap:4px; }
  .season-link { display:inline-flex; align-items:center; gap:4px; margin-top:8px; font-size:12px; font-weight:600; color:var(--accent-light); text-decoration:none; padding:4px 12px; border-radius:20px; background:rgba(108,99,255,0.12); border:1px solid rgba(108,99,255,0.3); transition:all 0.3s ease; }
  .season-link:hover { background:rgba(108,99,255,0.25); border-color:var(--accent); color:#fff; transform:translateX(2px); }

  .characters-section { padding:32px 40px; }
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
  .section-header h3 { font-size:20px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .section-header h3::before { content:''; width:4px; height:22px; background:var(--gradient-2); border-radius:2px; }
  .section-header .char-count { font-size:13px; color:var(--text-muted); }

  .char-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px; }
  .char-card { background:var(--bg-card); border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275); border:1px solid transparent; position:relative; }
  .char-card:hover { transform:translateY(-8px); border-color:var(--accent); box-shadow:0 12px 40px rgba(108,99,255,0.2); }
  .char-card .card-image { width:100%; height:280px; overflow:hidden; position:relative; }
  .char-card .card-image img { width:100%; height:100%; object-fit:cover; transition:transform 0.5s ease; }
  .char-card:hover .card-image img { transform:scale(1.08); }
  .char-card .card-image .card-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:64px; }
  .char-card .card-image .role-badge { position:absolute; top:12px; right:12px; padding:3px 12px; border-radius:20px; font-size:11px; font-weight:700; backdrop-filter:blur(10px); }
  .role-badge.protagonist { background:rgba(108,99,255,0.7); color:#fff; }
  .role-badge.supporting { background:rgba(0,210,255,0.6); color:#fff; }
  .role-badge.antagonist { background:rgba(245,87,108,0.6); color:#fff; }
  .char-card .card-body { padding:16px; }
  .char-card .char-name { font-size:16px; font-weight:700; margin-bottom:3px; }
  .char-card .char-name-jp { font-size:12px; color:var(--text-muted); margin-bottom:8px; font-weight:300; }
  .char-card .char-cv { font-size:12px; color:var(--text-secondary); }
  .char-card .char-cv strong { color:var(--accent-light); }

  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(8px); z-index:1000; align-items:center; justify-content:center; padding:20px; animation:fadeIn 0.3s ease; }
  .modal-overlay.show { display:flex; }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  .modal { background:var(--bg-secondary); border-radius:20px; width:100%; max-width:900px; max-height:90vh; overflow:hidden; display:flex; flex-direction:column; border:1px solid var(--border); animation:slideUp 0.4s cubic-bezier(0.175,0.885,0.32,1.275); box-shadow:0 24px 80px rgba(0,0,0,0.6); }
  @keyframes slideUp { from{transform:translateY(40px);opacity:0;} to{transform:translateY(0);opacity:1;} }
  .modal-header { display:flex; align-items:center; justify-content:space-between; padding:20px 28px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .modal-header h2 { font-size:20px; font-weight:700; }
  .modal-close { width:36px; height:36px; border-radius:50%; border:1px solid var(--border); background:transparent; color:var(--text-secondary); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .modal-close:hover { background:rgba(245,87,108,0.15); border-color:#f5576c; color:#f5576c; }
  .modal-body { overflow-y:auto; padding:28px; flex:1; }
  .modal-body::-webkit-scrollbar { width:5px; }
  .modal-body::-webkit-scrollbar-thumb { background:var(--accent); border-radius:5px; }

  .profile-layout { display:flex; gap:32px; margin-bottom:28px; }
  .profile-image-box { width:240px; flex-shrink:0; }
  .profile-image-box img { width:100%; border-radius:var(--radius); box-shadow:0 8px 32px rgba(0,0,0,0.4); }
  .profile-image-box .placeholder-img { width:100%; height:320px; border-radius:var(--radius); display:flex; align-items:center; justify-content:center; font-size:96px; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
  .profile-main { flex:1; }

  .profile-name-block { margin-bottom:20px; }
  .profile-name-block .p-name { font-family:'Zen Maru Gothic',sans-serif; font-size:32px; font-weight:900; margin-bottom:4px; }
  .profile-name-block .p-name-jp { font-size:16px; color:var(--text-muted); margin-bottom:4px; }
  .profile-name-block .p-cv { font-size:13px; color:var(--text-secondary); }
  .profile-name-block .p-cv strong { color:var(--accent-light); }

  .attr-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
  .attr-item { background:rgba(108,99,255,0.06); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 14px; }
  .attr-item .attr-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:3px; }
  .attr-item .attr-value { font-size:14px; font-weight:500; }

  .info-section { margin-bottom:24px; }
  .info-section h4 { font-size:15px; font-weight:700; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
  .info-section h4 .icon { font-size:18px; }
  .info-section p, .info-section ul { font-size:14px; line-height:1.9; color:var(--text-secondary); }
  .info-section ul { padding-left:20px; }
  .info-section ul li { margin-bottom:4px; }

  .quote-block { background:linear-gradient(135deg,rgba(108,99,255,0.08),rgba(224,64,251,0.06)); border-left:3px solid var(--accent); border-radius:0 var(--radius-sm) var(--radius-sm) 0; padding:16px 20px; margin-bottom:20px; font-style:italic; font-size:15px; line-height:1.8; color:var(--text-primary); position:relative; }
  .quote-block::before { content:'"'; font-size:40px; color:var(--accent); position:absolute; top:-4px; left:10px; font-family:serif; opacity:0.5; }

  .ability-bars { display:flex; flex-direction:column; gap:10px; }
  .ability-bar { display:flex; align-items:center; gap:12px; }
  .ability-bar .bar-label { width:70px; font-size:13px; color:var(--text-secondary); text-align:right; flex-shrink:0; }
  .ability-bar .bar-track { flex:1; height:8px; background:rgba(108,99,255,0.1); border-radius:4px; overflow:hidden; }
  .ability-bar .bar-fill { height:100%; border-radius:4px; transition:width 1s cubic-bezier(0.25,0.46,0.45,0.94); width:0; }
  .ability-bar .bar-value { width:32px; font-size:12px; font-weight:700; color:var(--accent-light); }

  .gallery-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; }
  .gallery-grid img { width:100%; border-radius:var(--radius-sm); cursor:pointer; transition:all 0.3s; border:2px solid transparent; }
  .gallery-grid img:hover { border-color:var(--accent); transform:scale(1.03); box-shadow:0 4px 20px rgba(108,99,255,0.3); }

  /* 库洛牌收藏页面 */
  .clow-cards-btn {
    display: inline-flex; align-items: center; gap: 8px; padding: 10px 24px; border-radius: 30px;
    background: var(--gradient-3); color: #fff; font-size: 14px; font-weight: 700;
    cursor: pointer; border: none; transition: all 0.3s; margin-top: 16px;
  }
  .clow-cards-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(240,147,251,0.4); }
  .clow-cards-page { padding: 32px 40px; }
  .clow-cards-page h3 { font-size: 22px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .clow-cards-page h3::before { content: ''; width: 4px; height: 24px; background: var(--gradient-3); border-radius: 2px; }
  .clow-cards-page .subtitle { color: var(--text-muted); font-size: 13px; margin-bottom: 24px; }
  .clow-filter { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .clow-filter .filter-btn { padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600;
    background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.2s; }
  .clow-filter .filter-btn.active, .clow-filter .filter-btn:hover {
    background: rgba(240,147,251,0.2); color: #f093fb; border-color: rgba(240,147,251,0.5); }
  .clow-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
  .clow-card-item { background: var(--bg-card); border-radius: var(--radius-sm); overflow: hidden; cursor: pointer;
    border: 1px solid var(--border); transition: all 0.3s; }
  .clow-card-item:hover { transform: translateY(-6px); border-color: #f093fb; box-shadow: 0 8px 32px rgba(240,147,251,0.2); }
  .clow-card-item .card-img { width: 100%; aspect-ratio: 3/4; overflow: hidden; position: relative; }
  .clow-card-item .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
  .clow-card-item:hover .card-img img { transform: scale(1.05); }
  .clow-card-item .card-img .card-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:40px; }
  .clow-card-item .card-img .attr-tag { position: absolute; top:6px; left:6px; padding:2px 8px; border-radius:12px;
    font-size:10px; font-weight:700; backdrop-filter:blur(8px); }
  .attr-tag.sun { background:rgba(255,170,50,0.75); color:#fff; }
  .attr-tag.moon { background:rgba(100,120,220,0.75); color:#fff; }
  .clow-card-item .card-footer { padding: 10px 12px; }
  .clow-card-item .cn-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .clow-card-item .en-name { font-size: 11px; color: var(--text-muted); }
  .clow-card-item .ep-tag { font-size: 10px; color: var(--accent-light); margin-top: 4px; }
  .back-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 18px; border-radius:20px;
    font-size:13px; font-weight:600; background:var(--bg-card); color:var(--text-secondary);
    border:1px solid var(--border); cursor:pointer; transition:all 0.2s; margin-bottom:20px; }
  .back-btn:hover { background:var(--bg-card-hover); color:var(--text-primary); }

  @media (max-width: 768px) {
    .sidebar { width:60px; min-width:60px; }
    .sidebar-title, .anime-item .anime-info, .home-btn span:last-child, .sidebar-divider { display:none; }
    .home-btn { justify-content:center; padding:12px; }
    .anime-item { justify-content:center; padding:12px; }
    .anime-item .anime-icon { width:40px; height:40px; font-size:16px; }
    .banner-content { flex-direction:column; align-items:center; text-align:center; }
    .banner-poster { width:120px; height:170px; }
    .banner-info h1 { font-size:24px; }
    .profile-layout { flex-direction:column; }
    .profile-image-box { width:100%; }
    .anime-synopsis,.characters-section,.seasons-section { padding:24px 20px; }
    .anime-banner .banner-overlay { padding:20px; }
  }
</style>
</head>
<body>

<div class="bg-effects"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

<header class="site-header">
  <div class="logo">ANIME PROFILE</div>
  <div class="subtitle">动漫人物档案库</div>
</header>

<div class="main-layout">
  <nav class="sidebar">
    <div class="home-btn" onclick="goHome()">
      <span class="home-icon">🏠</span>
      <span>返回首页</span>
    </div>
    <div class="sidebar-divider"></div>
    <div class="search-box">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" id="searchInput" placeholder="搜索作品名称..." oninput="filterAnime()">
      </div>
    </div>
    <div class="sidebar-title">作品列表</div>
    <div id="animeList"></div>
  </nav>

// ========== 渲染逻辑 ==========

function renderSidebar() {
  const list = document.getElementById('animeList');
  list.innerHTML = animeDatabase.map(anime => `
    <div class="anime-item" data-id="${anime.id}" onclick="selectAnime('${anime.id}')">
      <div class="anime-icon" style="background:${anime.bannerGradient};">
        ${anime.posterImage ? `<img src="${anime.posterImage}" alt="${anime.name}">` : `<span style="font-size:24px;">${anime.icon}</span>`}
      </div>
      <div class="anime-info">
        <div class="anime-name">${anime.name}</div>
        <div class="anime-meta">${anime.episodes} · ${anime.year}</div>
      </div>
    </div>
  `).join('');
}

function goHome() {
  document.getElementById('welcomePage').style.display = 'flex';
  document.getElementById('animeDetailContainer').innerHTML = '';
  document.querySelectorAll('.anime-item').forEach(el => el.classList.remove('active'));
}

function filterAnime() {
  const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
  document.querySelectorAll('.anime-item').forEach(item => {
    const name = item.querySelector('.anime-name').textContent.toLowerCase();
    if (!keyword || name.includes(keyword)) {
      item.classList.remove('anime-hidden');
    } else {
      item.classList.add('anime-hidden');
    }
  });
}

function selectAnime(id) {
  document.getElementById('welcomePage').style.display = 'none';
  document.querySelectorAll('.anime-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-id="${id}"]`).classList.add('active');
  const anime = animeDatabase.find(a => a.id === id);
  renderAnimeDetail(anime);
}

function renderAnimeDetail(anime) {
  const container = document.getElementById('animeDetailContainer');
  const roleClassMap = { protagonist:'protagonist', supporting:'supporting', antagonist:'antagonist' };

  container.innerHTML = `
    <div class="anime-detail active">
      <div class="anime-banner">
        ${anime.bannerImage
          ? `<img class="banner-bg" src="${anime.bannerImage}" alt="${anime.name}" onerror="this.nextElementSibling.style.display='block';this.style.display='none';">
             <div style="width:100%;height:100%;background:${anime.bannerGradient};display:none;"></div>`
          : `<div style="width:100%;height:100%;background:${anime.bannerGradient};"></div>`
        }
        <div class="banner-overlay">
          <div class="banner-content">
            <div class="banner-poster" style="${anime.posterImage ? '' : 'background:'+anime.posterColor+';display:flex;align-items:center;justify-content:center;'}">
              ${anime.posterImage
                ? `<img src="${anime.posterImage}" alt="${anime.name}" style="width:100%;height:100%;object-fit:cover;">`
                : `<span style="font-size:72px;">${anime.icon}</span>`
              }
            </div>
            <div class="banner-info">
              <h1>${anime.name}</h1>
              <div class="jp-name">${anime.nameJp}</div>
              <div class="banner-tags">${anime.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
              <div class="banner-stats">
                <span><span class="stat-icon">🎬</span>${anime.studio}</span>
                <span><span class="stat-icon">📺</span>${anime.episodes}</span>
                <span><span class="stat-icon">📅</span>${anime.year}</span>
                <span><span class="stat-icon">⭐</span>${anime.rating}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="anime-synopsis">
        <h3>作品简介</h3>
        <p>${anime.synopsis}</p>
      </div>

      ${anime.seasons ? `
      <div class="seasons-section">
        <h3>播出信息</h3>
        <div class="season-list">
          ${anime.seasons.map((s, i) => `
            <div class="season-card">
              <span class="season-badge">${s.title}</span>
              <div class="season-info">
                <div class="season-title">${s.subtitle}</div>
                <div class="season-meta">
                  <span>📺 ${s.episodes}</span>
                  <span>📅 ${s.year}</span>
                  <span>🎬 ${s.studio}</span>
                </div>
                ${s.link ? `<a href="${s.link}" target="_blank" rel="noopener noreferrer" class="season-link" onclick="event.stopPropagation();">▶ 在线观看${s.linkLabel ? ' · ' + s.linkLabel : ''}</a>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>` : ''}

      <div class="characters-section" id="charactersSection">
        <div class="section-header">
          <h3>人物图鉴</h3>
          <span class="char-count">共 ${anime.characters.length} 位角色</span>
        </div>
        ${anime.id === 'ccs' ? '<button class="clow-cards-btn" onclick="showClowCards()">🎴 进入库洛牌收藏</button>' : ''}
        <div class="char-grid">
          ${anime.characters.map((char, i) => `
            <div class="char-card" onclick="openCharacter('${anime.id}', ${i})">
              <div class="card-image" style="${char.image ? '' : 'background:'+char.gradient+';'}">
                ${char.image ? `<img src="${char.image}" alt="${char.name}">` : `<div class="card-placeholder">${char.emoji}</div>`}
                <span class="role-badge ${roleClassMap[char.role]}">${char.roleLabel}</span>
              </div>
              <div class="card-body">
                <div class="char-name">${char.name}</div>
                <div class="char-name-jp">${char.nameJp}</div>
                <div class="char-cv">CV: <strong>${char.cv}</strong></div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
      <div id="clowCardsPage" style="display:none;"></div>
    </div>
  `;
  document.querySelector('.content-area').scrollTop = 0;
}

function openCharacter(animeId, charIndex) {
  const anime = animeDatabase.find(a => a.id === animeId);
  const char = anime.characters[charIndex];
  document.getElementById('modalTitle').textContent = char.name + ' · 人物档案';
  const body = document.getElementById('modalBody');
  body.innerHTML = `
    <div class="profile-layout">
      <div class="profile-image-box">
        ${char.image
          ? `<img src="${char.image}" alt="${char.name}">`
          : `<div class="placeholder-img" style="background:${char.gradient};">${char.emoji}</div>`
        }
      </div>
      <div class="profile-main">
        <div class="profile-name-block">
          <div class="p-name">${char.name}</div>
          <div class="p-name-jp">${char.nameJp}</div>
          <div class="p-cv">CV: <strong>${char.cv}</strong></div>
        </div>
        <div class="attr-grid">
          <div class="attr-item"><div class="attr-label">年龄</div><div class="attr-value">${char.age}</div></div>
          <div class="attr-item"><div class="attr-label">身高</div><div class="attr-value">${char.height}</div></div>
          <div class="attr-item"><div class="attr-label">体重</div><div class="attr-value">${char.weight}</div></div>
          <div class="attr-item"><div class="attr-label">所属</div><div class="attr-value">${char.affiliation}</div></div>
          <div class="attr-item"><div class="attr-label">生日</div><div class="attr-value">${char.birthday}</div></div>
          <div class="attr-item"><div class="attr-label">血型</div><div class="attr-value">${char.bloodType}</div></div>
          <div class="attr-item"><div class="attr-label">身份</div><div class="attr-value">${char.status}</div></div>
          ${char.titanForms && char.titanForms.length ? `<div class="attr-item"><div class="attr-label">特殊形态</div><div class="attr-value">${char.titanForms.join(' / ')}</div></div>` : ''}
        </div>
      </div>
    </div>
    <div class="quote-block">${char.quote}</div>
    <div class="info-section">
      <h4><span class="icon">📊</span> 能力数值</h4>
      <div class="ability-bars">
        ${char.abilities.map(a => `
          <div class="ability-bar">
            <span class="bar-label">${a.name}</span>
            <div class="bar-track"><div class="bar-fill" data-width="${a.value}" style="background:${a.color};"></div></div>
            <span class="bar-value">${a.value}</span>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="info-section">
      <h4><span class="icon">🧠</span> 性格特点</h4>
      <p>${char.personality}</p>
    </div>
    <div class="info-section">
      <h4><span class="icon">📜</span> 背景故事</h4>
      <p>${char.background}</p>
    </div>
    ${char.gallery && char.gallery.length ? `
    <div class="info-section">
      <h4><span class="icon">🖼️</span> 人物图鉴</h4>
      <div class="gallery-grid">${char.gallery.map(img => `<img src="${img}" alt="${char.name}">`).join('')}</div>
    </div>` : `
    <div class="info-section">
      <h4><span class="icon">🖼️</span> 人物图鉴</h4>
      <p style="color:var(--text-muted);font-style:italic;">图片收录中，敬请期待...</p>
    </div>`}
  `;
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(bar => { bar.style.width = bar.dataset.width + '%'; });
  }, 100);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

// ========== 库洛牌页面 ==========
let currentFilter = '全部';

function showClowCards() {
  document.getElementById('charactersSection').style.display = 'none';
  const page = document.getElementById('clowCardsPage');
  page.style.display = 'block';

  const attrs = ['全部','太阳','月亮','风','水','大地'];
  page.innerHTML = `
    <div class="clow-cards-page">
      <button class="back-btn" onclick="hideClowCards()">← 返回人物列表</button>
      <h3>🎴 库洛牌收藏</h3>
      <p class="subtitle">由库洛·里多创造的53张魔法卡牌，每张拥有独特意识与能力。共收录 ${clowCards.length} 张</p>
      <div class="clow-filter" id="clowFilter">
        ${attrs.map(a => `<button class="filter-btn ${a==='全部'?'active':''}" onclick="filterClowCards('${a}')">${a}属性</button>`).join('')}
      </div>
      <div class="clow-grid" id="clowGrid"></div>
    </div>
  `;
  renderClowGrid(currentFilter);
}

function hideClowCards() {
  document.getElementById('clowCardsPage').style.display = 'none';
  document.getElementById('charactersSection').style.display = 'block';
  currentFilter = '全部';
}

function filterClowCards(attr) {
  currentFilter = attr;
  document.querySelectorAll('.clow-filter .filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderClowGrid(attr);
}

function renderClowGrid(filter) {
  const grid = document.getElementById('clowGrid');
  const filtered = filter === '全部' ? clowCards : clowCards.filter(c => c.attr === filter);
  grid.innerHTML = filtered.map(c => {
    const attrClass = (c.attr === '太阳' || c.attr === '大地') ? 'sun' : 'moon';
    return `
    <div class="clow-card-item" onclick="showCardDetail('${c.en}')">
      <div class="card-img" style="background:linear-gradient(135deg,#2a1a3a,#5a3a6a);">
        ${c.img ? `<img src="${c.img}" alt="${c.name}" referrerpolicy="no-referrer" onerror="this.parentElement.innerHTML='<div class=\\'card-placeholder\\'>🎴</div>'">` : '<div class="card-placeholder">🎴</div>'}
        <span class="attr-tag ${attrClass}">${c.attr}</span>
      </div>
      <div class="card-footer">
        <div class="cn-name">${c.name}牌</div>
        <div class="en-name">THE ${c.en}</div>
        <div class="ep-tag">📺 ${c.episode}</div>
      </div>
    </div>`;
  }).join('');
}

function showCardDetail(en) {
  const card = clowCards.find(c => c.en === en);
  if (!card) return;
  const anime = animeDatabase.find(a => a.id === 'ccs');
  document.getElementById('modalTitle').textContent = card.name + '牌 · 库洛牌详情';
  const body = document.getElementById('modalBody');
  const attrClass = (card.attr === '太阳' || card.attr === '大地') ? 'sun' : 'moon';
  body.innerHTML = `
    <div style="text-align:center;margin-bottom:24px;">
      <div style="display:inline-block;width:200px;height:280px;border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.5);background:linear-gradient(135deg,#2a1a3a,#5a3a6a);">
        ${card.img ? `<img src="${card.img}" alt="${card.name}牌" referrerpolicy="no-referrer" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='<div style=\\'display:flex;align-items:center;justify-content:center;height:100%;font-size:96px;\\'>🎴</div>'">` : '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:96px;">🎴</div>'}
      </div>
    </div>
    <div class="profile-name-block" style="text-align:center;">
      <div class="p-name">${card.name}牌</div>
      <div class="p-name-jp">「${card.nameJp}」 THE ${card.en}</div>
    </div>
    <div class="attr-grid" style="margin-bottom:20px;">
      <div class="attr-item"><div class="attr-label">属性</div><div class="attr-value">${card.attr}</div></div>
      <div class="attr-item"><div class="attr-label">登场集数</div><div class="attr-value">${card.episode}</div></div>
    </div>
    <div class="info-section">
      <h4><span class="icon">✨</span> 能力描述</h4>
      <p style="line-height:2;">${card.ability}</p>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('show');
}

renderSidebar();
</script>
</body>
